services:
  db:
    image: postgres:16-alpine
    container_name: streaming_db_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      # This maps the local SQL files to the Postgres auto-init folder
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/02_seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
      - postgres_data:/var/lib/postgresql/data
      # Mount the full database folder elsewhere for easy access within the container
      - ./database:/home/database_scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER} -d $${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - modtube-network

  # --- Backend Service (Express) ---
  backend:
    build: ./backend
    container_name: modtube-backend
    restart: always
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PORT: ${BACKEND_PORT}
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: yarn dev
    depends_on:
      db:
        condition: service_healthy # รอให้ DB พร้อมใช้งานก่อนค่อยรัน backend
    networks:
      - modtube-network
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

# --- Networking & Storage Setup ---
networks:
  modtube-network:
    driver: bridge

volumes:
  postgres_data: